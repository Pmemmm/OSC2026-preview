services:
  - type: web
    name: mgpic2026
    runtime: docker
    healthCheckPath: /api/health
    disk:
      name: mgpic-data
      mountPath: /var/lib/mgpic
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MGPIC_DB
        value: /var/lib/mgpic/mgpic2026.sqlite3
      - key: GITHUB_OAUTH_REDIRECT_URI
        value: https://mgpic2026.onrender.com/api/auth/github/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
