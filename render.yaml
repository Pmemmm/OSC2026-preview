services:
  - type: web
    name: mgpic2026
    runtime: docker
    healthCheckPath: /api/health
    disk:
      name: mgpic-data
      mountPath: /var/lib/mgpic
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MGPIC_DB
        value: /var/lib/mgpic/mgpic2026.sqlite3
      - key: MGPIC_BACKUP_DIR
        value: /var/lib/mgpic/backups
      - key: MGPIC_SNAPSHOT_DIR
        value: /var/lib/mgpic/snapshots
      - key: MGPIC_LEDGER_PATH
        value: /var/lib/mgpic/ledger/events.jsonl
      - key: MGPIC_MAX_BACKUPS
        value: "30"
      - key: MGPIC_MAX_SNAPSHOTS
        value: "100"
      - key: GITHUB_OAUTH_REDIRECT_URI
        value: https://mgpic2026.onrender.com/api/auth/github/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_GITHUB_LOGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FEISHU_APP_ID
        sync: false
      - key: FEISHU_APP_SECRET
        sync: false
      - key: FEISHU_APP_TOKEN
        sync: false
      - key: FEISHU_TABLE_ID
        value: tblpdjqjCZdRNJah
      - key: FEISHU_VIEW_ID
        value: vewygPXWz5
      - key: FEISHU_FIELD_MAP
        sync: false
      - key: FEISHU_AUTO_SYNC_ENABLED
        value: "1"
      - key: FEISHU_AUTO_SYNC_INTERVAL_SECONDS
        value: "21600"
      - key: FEISHU_AUTO_SYNC_RUN_ON_START
        value: "1"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
